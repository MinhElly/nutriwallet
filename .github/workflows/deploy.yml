name: Deploy

on:
  workflow_dispatch:
    inputs:
      app_dir:
        description: Absolute path to the repo on the server
        required: true
        default: /opt/nutriwallet
      branch:
        description: Branch to deploy
        required: true
        default: main

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e
            cd "${{ inputs.app_dir }}"
            git pull --ff-only origin "${{ inputs.branch }}"
            docker compose up -d --build --remove-orphans
            docker compose ps
