server:
  port: ${SERVER_PORT:${BACKEND_PORT:8080}}
  forward-headers-strategy: framework

spring:
  application:
    name: nutricash-backend
  profiles:
    default: dev
  datasource:
    url: "${DB_URL:jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:nutricash_ai}?useUnicode=true&characterEncoding=UTF-8&connectionCollation=utf8mb4_unicode_ci&serverTimezone=Asia/Ho_Chi_Minh&allowPublicKeyRetrieval=true&useSSL=false}"
    username: ${MYSQL_USER:nutricash}
    password: ${MYSQL_PASSWORD:nutricash_dev_password}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      connection-timeout: 30000
      maximum-pool-size: ${DB_POOL_SIZE:10}
  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    open-in-view: false
    show-sql: ${JPA_SHOW_SQL:true}
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: Asia/Ho_Chi_Minh
  jackson:
    time-zone: Asia/Ho_Chi_Minh
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          connectiontimeout: ${MAIL_CONNECTION_TIMEOUT:5000}
          timeout: ${MAIL_TIMEOUT:5000}
          writetimeout: ${MAIL_WRITE_TIMEOUT:5000}
          starttls:
            enable: true
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:nutriwallet}
    password: ${RABBITMQ_PASSWORD:nutriwallet_dev_password}
    publisher-confirm-type: correlated
    publisher-returns: true
    listener:
      simple:
        default-requeue-rejected: false
        retry:
          enabled: true
          max-attempts: 3
          initial-interval: 2000
          multiplier: 2
          max-interval: 15000
  flyway:
    enabled: ${FLYWAY_ENABLED:true}
    baseline-on-migrate: true
    baseline-version: 1
    locations: classpath:db/migration
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

springdoc:
  packages-to-scan: com.nutricash.api
  paths-to-match: /api/**
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /api
    operations-sorter: method
    tags-sorter: alpha

logging:
  level:
    com.nutricash.api: INFO
    org.hibernate.SQL: ${HIBERNATE_SQL_LOG_LEVEL:DEBUG}

app:
  frontend-url: ${FRONTEND_URL:http://localhost:${FRONTEND_PORT:5173}}
  api-url: ${API_BASE_URL:${VITE_API_BASE_URL:http://localhost:${BACKEND_PORT:8080}/api}}
  backend-url: ${BACKEND_URL:http://localhost:8081}
  security:
    enabled: ${SECURITY_ENABLED:true}
    jwt-secret: ${JWT_SECRET:replace_with_a_secure_random_secret_of_at_least_32_characters}
    jwt-expiration-minutes: ${JWT_EXPIRATION_MINUTES:1440}
  mail:
    from: ${MAIL_FROM:${MAIL_USERNAME:}}
  ai:
    provider: ${AI_PROVIDER:GEMINI}
    api-key: ${AI_API_KEY}
    model: ${AI_MODEL}
    base-url: ${AI_BASE_URL:https://generativelanguage.googleapis.com}
    retry:
      max-attempts: ${AI_RETRY_MAX_ATTEMPTS:3}
    cache:
      ttl-days: ${AI_CACHE_TTL_DAYS:30}
    worker:
      jobs-per-second: ${AI_JOBS_PER_SECOND:3}
      prefetch: 1
  cloudinary:
    cloud-name: ${CLOUDINARY_CLOUD_NAME:}
    api-key: ${CLOUDINARY_API_KEY:}
    api-secret: ${CLOUDINARY_API_SECRET:}
  messenger:
    verify-token: ${MESSENGER_VERIFY_TOKEN:my_messenger_verify_token}
    page-access-token: ${MESSENGER_PAGE_ACCESS_TOKEN:}

facebook:
  app-secret: ${FACEBOOK_CLIENT_SECRET:123456789012345}

gemini:
  api-key: ${GEMINI_API_KEY}
  model: ${GEMINI_MODEL:gemini-2.5-flash}
  fallback-model: ${GEMINI_FALLBACK_MODEL:gemini-2.5-flash-lite}
  max-output-tokens: ${GEMINI_MAX_OUTPUT_TOKENS:512}
  retry:
    max-attempts: ${GEMINI_RETRY_MAX_ATTEMPTS:3}
    initial-delay-ms: ${GEMINI_RETRY_INITIAL_DELAY_MS:2000}
    multiplier: ${GEMINI_RETRY_MULTIPLIER:2}
    max-delay-ms: ${GEMINI_RETRY_MAX_DELAY_MS:8000}
