spring:
  datasource:
    url: jdbc:h2:mem:nutricash_test;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  flyway:
    enabled: false
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: create-drop
    show-sql: false

springdoc:
  api-docs:
    enabled: false

app:
  backend-url: http://localhost:8081

facebook:
  app-secret: mock-facebook-app-secret-for-testing
