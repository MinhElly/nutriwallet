<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <!-- Premium Green Gradient -->
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22C55E" />
      <stop offset="100%" stop-color="#15803D" />
    </linearGradient>
    <!-- Soft Drop Shadow for Leaf -->
    <filter id="dropShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="1" stdDeviation="1" flood-color="#052E16" flood-opacity="0.25" />
    </filter>
  </defs>

  <!-- Background Rounded Rect -->
  <rect width="32" height="32" rx="9" fill="url(#greenGrad)" />

  <!-- White Leaf Icon in Center -->
  <g filter="url(#dropShadow)">
    <path
      d="M16.5 24.5c-4.14 0-7.5-3.36-7.5-7.5 0-3.32 2.21-6.12 5.25-7.05 4.31-.83 5.44-1.22 6.95-3.1 0.76 1.51 1.51 2.65 1.51 6.05 0 6.38-6.21 11.6-6.21 11.6Z"
      fill="#FFFFFF"
    />
    <path
      d="M22.71 6.85C21 10.12 18.73 12.25 16.67 14.42"
      stroke="#15803D"
      stroke-width="1.5"
      stroke-linecap="round"
    />
  </g>
</svg>